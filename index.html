<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tao Drawing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. VIDEO -->
    <div id="intro-video-container">
        <video id="intro-video" autoplay muted playsinline>
            <source src="images/tu-animacion.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 2. CARNET (.png) -->
    <div id="carnet-container" class="oculto">
        <div class="bloque-carnet" onclick="entrarAlSitio()">
            <img src="images/carnet.png" alt="Carnet Tao" class="imagen-carnet">
            <button class="btn-entrar-sitio">Entrar a la web</button>
        </div>
    </div>

    <!-- 3. CONTENIDO PRINCIPAL -->
    <div id="pantalla-principal">
        <header><img src="images/barra-superior-logo.png" alt="Logo" class="barra-azul-superior"></header>
        
        <main class="zona-contenido">
            <div id="contenido-redes" class="pestaña-contenido">
                <img src="images/hoja-redes-botones.png" alt="Redes" class="imagen-redes-base">
                <div class="capa-enlaces-redes">
                    <a href="https://www.tiktok.com" target="_blank"></a>
                    <a href="https://www.youtube.com" target="_blank"></a>
                    <a href="https://www.instagram.com" target="_blank"></a>
                </div>
            </div>
        </main>

        <footer>
            <img src="images/menu-redes.png" alt="Menu" class="imagen-barra-superior">
            <div class="capa-botones">
                <button onclick="cambiarPestana('redes')"></button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
