<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tao Drawing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- VIDEO INTRODUCCIÓN -->
    <div id="intro-video-container">
        <video src="images/tu-animacion.mp4" autoplay muted playsinline></video>
    </div>

    <!-- PANTALLA INTERMEDIA DEL CARNET -->
    <div id="carnet-container" class="invisible">
        <div class="bloque-carnet">
            <img src="images/carnet.png" class="imagen-carnet" alt="Carnet Tao">
            <button class="btn-entrar-sitio">Entrar</button>
        </div>
    </div>

    <!-- PANTALLA PRINCIPAL CON INTERFACES -->
    <div id="pantalla-principal" class="oculto">
        
        <!-- Cabecera Superior Fija -->
        <div class="cabecera-fija-horizontal">
            <img src="images/barra-superior-logo.png" class="barra-azul-superior" alt="Cabecera Superior">
        </div>

        <!-- CONTENEDOR CENTRAL DINÁMICO (ZONA DE PESTAÑAS) -->
        <div class="zona-contenido-pestana">

            <!-- PESTAÑA 1: REDES (Zonas de clic ampliadas drásticamente para no fallar) -->
            <div id="contenido-redes" class="contenedor-redes-interactivo pestaña-contenido" style="width: 85vw !important; max-width: 850px !important; height: auto !important; display: flex; justify-content: center; align-items: center; position: relative;">
                <img src="images/hoja-redes-botones.png" alt="Redes Tao" class="imagen-redes-base" style="width: 100% !important; height: auto !important; max-height: 68dvh !important; object-fit: contain !important; display: block;">
                
                <!-- Capa interactiva: Ahora ocupa el 78% de ancho y el 58% de alto para dar un margen gigante al pulsar -->
                <div class="capa-enlaces-redes" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -46%); width: 78%; height: 58%; display: flex; flex-direction: column; justify-content: space-between; z-index: 10;">
                    <a href="https://www.tiktok.com/@tao_drawing" target="_blank" class="link-red-invisible" style="display: block; width: 100%; height: 28%; cursor: pointer; border-radius: 30px;"></a>
                    <a href="https://www.youtube.com/@tao_drawing" target="_blank" class="link-red-invisible" style="display: block; width: 100%; height: 28%; cursor: pointer; border-radius: 30px;"></a>
                    <a href="https://www.instagram.com/tao_drawing/" target="_blank" class="link-red-invisible" style="display: block; width: 100%; height: 28%; cursor: pointer; border-radius: 30px;"></a>
                </div>
            </div>

            <!-- PESTAÑA 2: PROXIMAMENTE 1 (Texto eliminado, solo ilustración) -->
            <div id="contenido-proximamente1" class="pestaña-contenido oculto">
                <div style="text-align: center;">
                    <img src="images/construccion.png" alt="En construcción" style="max-width: 85vw; max-height: 58vh; object-fit: contain;">
                </div>
            </div>

            <!-- PESTAÑA 3: PROXIMAMENTE 2 (Texto eliminado, solo ilustración) -->
            <div id="contenido-proximamente2" class="pestaña-contenido oculto">
                <div style="text-align: center;">
                    <img src="images/construccion.png" alt="En construcción" style="max-width: 85vw; max-height: 58vh; object-fit: contain;">
                </div>
            </div>

            <!-- PESTAÑA 4: PROXIMAMENTE 3 (Texto eliminado, solo ilustración) -->
            <div id="contenido-proximamente3" class="pestaña-contenido oculto">
                <div style="text-align: center;">
                    <img src="images/construccion.png" alt="En construcción" style="max-width: 85vw; max-height: 58vh; object-fit: contain;">
                </div>
            </div>

            <!-- PESTAÑA 5: LUPA -->
            <div id="contenido-lupa" class="pestaña-contenido oculto">
                <!-- Espacio listo si pones algo para la búsqueda en el futuro -->
            </div>

        </div>

        <!-- MENÚ INTERACTIVO INFERIOR -->
        <div class="barra-superior-contenedor">
            <img id="imagen-menu-dinamica" src="images/menu-redes.png" class="imagen-barra-superior" alt="Barra de Navegación">
            <div class="capa-botones-horizontales">
                <button class="btn-horizontal-invisible" data-target="contenido-redes" data-menu="images/menu-redes.png"></button>
                <button class="btn-horizontal-invisible" data-target="contenido-proximamente1" data-menu="images/menu-prox1.png"></button>
                <button class="btn-horizontal-invisible" data-target="contenido-proximamente2" data-menu="images/menu-prox2.png"></button>
                <button class="btn-horizontal-invisible" data-target="contenido-proximamente3" data-menu="images/menu-prox3.png"></button>
                <button class="btn-horizontal-lupa" data-target="contenido-lupa" data-menu="images/menu-redes.png"></button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
